# /etc/modprobe.d/blacklist-mttcan.conf
#
# The Jetson Orin's onboard CAN controllers are exposed by the mttcan driver
# and claim the names can0 and can1 at boot. We use can0 as a virtual CAN
# (vcan) hub for routing between the two USB2CAN adapters, so we need to
# prevent mttcan from grabbing that name.
#
# Blacklisting prevents the module from being auto-loaded at boot. We don't
# use the onboard CAN, so this is safe.
#
# After installing this file, regenerate the initramfs:
#     sudo update-initramfs -u
# Then reboot.

blacklist mttcan
install mttcan /bin/true